services:
  postgres:
    image: postgres:16-alpine
    container_name: instabot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: instabot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: instabot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U instabot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  instabot:
    build: .
    container_name: instabot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://instabot:${POSTGRES_PASSWORD}@postgres:5432/instabot
      META_APP_SECRET: ${META_APP_SECRET}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN}
      INSTAGRAM_PAGE_ACCESS_TOKEN: ${INSTAGRAM_PAGE_ACCESS_TOKEN}
      INSTAGRAM_PAGE_ID: ${INSTAGRAM_PAGE_ID}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      WELCOME_EMAIL_TEMPLATE: ${WELCOME_EMAIL_TEMPLATE:-bienvenido.html}
    expose:
      - "3000"
    networks:
      - internal
      - proxy

networks:
  internal:
    driver: bridge
  proxy:
    external: true
    name: fase1-fundaciones_proxy_net

volumes:
  postgres_data:
